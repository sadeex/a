    <!-- App Container -->
    <div id="app"></div>

    <script>
        // ==================== STATE MANAGEMENT ====================
        const state = {
            currentPage: 'home',
            pageData: {},
            user: null,
            campaigns: [],
            demoProgress: 0,
            adminLoggedIn: false,
            cloudStatus: window.firebaseDB ? 'connected' : 'offline',
            adminCloudLoading: false,
            lastCloudSync: ''
        };

        const actionTimerIntervals = {};
        const ADMIN_USERNAME = 'sadithas59@gmail.com';
        const ADMIN_PASSCODE = 'Time?7@@';

        // Load state from localStorage
        function loadState() {
            const saved = localStorage.getItem('contentLocker');
            if (saved) {
                const data = JSON.parse(saved);
                state.user = data.user;
                state.campaigns = data.campaigns || [];
                if (state.user) {
                    state.campaigns = state.campaigns.map(campaign => ensureUniqueCampaignSlug(campaign));
                }
            }
            state.adminLoggedIn = localStorage.getItem('contentLockerAdminSession') === 'true';
            if (state.user) {
                syncCurrentWorkspaceToAdminStore();
            }
        }

        // Save state to localStorage
        function saveState() {
            if (Array.isArray(state.campaigns) && state.campaigns.length) {
                state.campaigns = state.campaigns.map(campaign => ensureUniqueCampaignSlug(campaign));
            }
            localStorage.setItem('contentLocker', JSON.stringify({
                user: state.user,
                campaigns: state.campaigns
            }));
            syncCurrentWorkspaceToAdminStore();
            syncCurrentWorkspaceToCloud();
        }



        // ==================== ADMIN STORE HELPERS ====================
        function getAdminStore() {
            try {
                const saved = localStorage.getItem('contentLockerAdminStore');
                const store = saved ? JSON.parse(saved) : { users: [], campaigns: [] };
                store.users = Array.isArray(store.users) ? store.users : [];
                store.campaigns = Array.isArray(store.campaigns) ? store.campaigns : [];
                return store;
            } catch (error) {
                return { users: [], campaigns: [] };
            }
        }

        function saveAdminStore(store) {
            localStorage.setItem('contentLockerAdminStore', JSON.stringify({
                users: Array.isArray(store.users) ? store.users : [],
                campaigns: Array.isArray(store.campaigns) ? store.campaigns : []
            }));
        }

        function syncCurrentWorkspaceToAdminStore() {
            if (!state.user || !state.user.username) return;

            const store = getAdminStore();
            const existingUserIndex = store.users.findIndex(user => user.username === state.user.username);
            const userRecord = {
                username: state.user.username,
                name: state.user.name || state.user.username,
                email: state.user.email || '',
                plan: state.user.plan || 'free',
                isGuest: !!state.user.isGuest,
                lastSeen: new Date().toISOString()
            };

            if (existingUserIndex >= 0) {
                store.users[existingUserIndex] = { ...store.users[existingUserIndex], ...userRecord };
            } else {
                store.users.push({ ...userRecord, createdAt: new Date().toISOString() });
            }

            const currentCampaigns = (state.campaigns || []).map(campaign => ({
                ...ensureUniqueCampaignSlug(campaign),
                ownerUsername: state.user.username,
                ownerName: state.user.name || state.user.username,
                ownerEmail: state.user.email || ''
            }));

            store.campaigns = [
                ...store.campaigns.filter(campaign => campaign.ownerUsername !== state.user.username),
                ...currentCampaigns
            ];

            saveAdminStore(store);
        }

        function getAdminCampaign(ownerUsername, campaignId) {
            const store = getAdminStore();
            const campaign = store.campaigns.find(campaign => campaign.ownerUsername === ownerUsername && campaign.id === campaignId);
            return campaign ? ensureUniqueCampaignSlug(campaign) : campaign;
        }

        function saveCampaignEverywhere(ownerUsername, campaignId, updatedCampaign) {
            const store = getAdminStore();
            const campaignIndex = store.campaigns.findIndex(campaign => campaign.ownerUsername === ownerUsername && campaign.id === campaignId);
            const campaignToSave = ensureUniqueCampaignSlug({
                ...updatedCampaign,
                id: campaignId,
                ownerUsername,
                updatedAt: new Date().toISOString()
            });

            if (campaignIndex >= 0) {
                store.campaigns[campaignIndex] = campaignToSave;
            } else {
                store.campaigns.push(campaignToSave);
            }
            saveAdminStore(store);

            if (state.user && state.user.username === ownerUsername) {
                const localIndex = state.campaigns.findIndex(campaign => campaign.id === campaignId);
                if (localIndex >= 0) {
                    state.campaigns[localIndex] = { ...campaignToSave };
                } else {
                    state.campaigns.push({ ...campaignToSave });
                }
                localStorage.setItem('contentLocker', JSON.stringify({
                    user: state.user,
                    campaigns: state.campaigns
                }));
            }

            cloudSaveCampaign(ownerUsername, campaignToSave).catch(error => {
                console.error('Could not save campaign to Firebase:', error);
                setCloudStatus('error', error.message || String(error));
            });
        }

        function deleteCampaignEverywhere(ownerUsername, campaignId) {
            const store = getAdminStore();
            store.campaigns = store.campaigns.filter(campaign => !(campaign.ownerUsername === ownerUsername && campaign.id === campaignId));
            saveAdminStore(store);

            if (state.user && state.user.username === ownerUsername) {
                state.campaigns = state.campaigns.filter(campaign => campaign.id !== campaignId);
                localStorage.setItem('contentLocker', JSON.stringify({
                    user: state.user,
                    campaigns: state.campaigns
                }));
            }

            cloudDeleteCampaign(ownerUsername, campaignId).catch(error => {
                console.error('Could not delete campaign from Firebase:', error);
                setCloudStatus('error', error.message || String(error));
            });
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeAttr(value) {
            return escapeHtml(value);
        }

        function jsString(value) {
            return String(value ?? '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/\n/g, '\\n')
                .replace(/\r/g, '');
        }


        // ==================== FIREBASE / CLOUD SYNC HELPERS ====================
        function isFirebaseReady() {
            return !!window.firebaseDB;
        }

        function getCampaignDocId(ownerUsername, campaignId) {
            return `${ownerUsername}__${campaignId}`.replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        function setCloudStatus(status, message = '') {
            state.cloudStatus = status;
            state.cloudError = message;
            if (status === 'connected' || status === 'synced') {
                state.lastCloudSync = new Date().toLocaleString();
            }
        }

        async function cloudSaveUser(user) {
            if (!isFirebaseReady() || !user || !user.username) return;
            const userRecord = {
                username: user.username,
                name: user.name || user.username,
                email: user.email || '',
                plan: user.plan || 'free',
                isGuest: !!user.isGuest,
                updatedAt: new Date().toISOString(),
                lastSeen: new Date().toISOString()
            };
            await window.firebaseDB.collection('users').doc(user.username).set(userRecord, { merge: true });
        }

        async function cloudSaveCampaign(ownerUsername, campaign) {
            if (!isFirebaseReady() || !ownerUsername || !campaign || !campaign.id) return;
            campaign = ensureUniqueCampaignSlug(campaign);
            const campaignRecord = {
                ...campaign,
                ownerUsername,
                ownerName: campaign.ownerName || state.user?.name || ownerUsername,
                ownerEmail: campaign.ownerEmail || state.user?.email || '',
                updatedAt: new Date().toISOString()
            };
            await window.firebaseDB.collection('campaigns').doc(getCampaignDocId(ownerUsername, campaign.id)).set(campaignRecord, { merge: true });
        }

        async function cloudDeleteCampaign(ownerUsername, campaignId) {
            if (!isFirebaseReady() || !ownerUsername || !campaignId) return;
            await window.firebaseDB.collection('campaigns').doc(getCampaignDocId(ownerUsername, campaignId)).delete();
        }

        async function syncCurrentWorkspaceToCloud() {
            if (!isFirebaseReady() || !state.user || !state.user.username) return;
            try {
                setCloudStatus('syncing');
                await cloudSaveUser(state.user);
                await Promise.all((state.campaigns || []).map(campaign => cloudSaveCampaign(state.user.username, {
                    ...campaign,
                    ownerUsername: state.user.username,
                    ownerName: state.user.name || state.user.username,
                    ownerEmail: state.user.email || ''
                })));
                setCloudStatus('synced');
            } catch (error) {
                console.error('Firebase sync failed:', error);
                setCloudStatus('error', error.message || String(error));
            }
        }

        async function loadCurrentUserCampaignsFromCloud() {
            if (!isFirebaseReady() || !state.user || !state.user.username) return;
            try {
                const snapshot = await window.firebaseDB.collection('campaigns').where('ownerUsername', '==', state.user.username).get();
                const cloudCampaigns = snapshot.docs.map(doc => ({ id: doc.data().id || doc.id, ...doc.data() }));
                if (cloudCampaigns.length) {
                    const byId = new Map((state.campaigns || []).map(campaign => [campaign.id, campaign]));
                    cloudCampaigns.forEach(campaign => byId.set(campaign.id, campaign));
                    state.campaigns = Array.from(byId.values());
                    localStorage.setItem('contentLocker', JSON.stringify({ user: state.user, campaigns: state.campaigns }));
                    syncCurrentWorkspaceToAdminStore();
                    render({ preserveScroll: true });
                }
            } catch (error) {
                console.warn('Could not load creator links from Firebase:', error);
                setCloudStatus('error', error.message || String(error));
            }
        }

        async function cloudLoadAdminStore() {
            if (!isFirebaseReady()) {
                return getAdminStore();
            }

            const [usersSnapshot, campaignsSnapshot] = await Promise.all([
                window.firebaseDB.collection('users').get(),
                window.firebaseDB.collection('campaigns').get()
            ]);

            const users = usersSnapshot.docs.map(doc => ({ username: doc.id, ...doc.data() }));
            const campaigns = campaignsSnapshot.docs.map(doc => ({ firebaseDocId: doc.id, ...doc.data() }));

            return { users, campaigns };
        }

        async function refreshAdminCloudData(showAlert = false) {
            if (!isFirebaseReady()) {
                setCloudStatus('offline', window.firebaseConnectionError || 'Firebase SDK is not loaded. Using local browser storage only.');
                if (showAlert) alert('Firebase is not connected. Admin is showing local browser data only.');
                return;
            }

            state.adminCloudLoading = true;
            if (state.currentPage === 'adminDashboard') render({ preserveScroll: true });

            try {
                setCloudStatus('syncing');
                const cloudStore = await cloudLoadAdminStore();
                saveAdminStore(cloudStore);
                state.adminCloudLoading = false;
                setCloudStatus('synced');
                if (state.currentPage === 'adminDashboard') render({ preserveScroll: true });
                if (showAlert) alert('Firebase data refreshed.');
            } catch (error) {
                console.error('Admin Firebase refresh failed:', error);
                state.adminCloudLoading = false;
                setCloudStatus('error', error.message || String(error));
                if (state.currentPage === 'adminDashboard') render({ preserveScroll: true });
                if (showAlert) alert('Could not refresh Firebase data: ' + (error.message || error));
            }
        }


        // ==================== UNIQUE LINK URL HELPERS ====================
        function slugifyTitle(value) {
            return String(value || 'link')
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .slice(0, 32) || 'link';
        }

        function getExistingCampaignSlugs(ignoreCampaignId = '') {
            const slugs = new Set();
            const addSlug = campaign => {
                if (!campaign || campaign.id === ignoreCampaignId || !campaign.slug) return;
                slugs.add(String(campaign.slug));
            };

            (state.campaigns || []).forEach(addSlug);
            getAdminStore().campaigns.forEach(addSlug);
            return slugs;
        }

        function generateUniqueCampaignSlug(title = 'link', ignoreCampaignId = '') {
            const existingSlugs = getExistingCampaignSlugs(ignoreCampaignId);
            const base = slugifyTitle(title);
            let candidate = '';

            do {
                const timeCode = Date.now().toString(36);
                const randomCode = Math.random().toString(36).slice(2, 7);
                candidate = `${base}-${timeCode}-${randomCode}`;
            } while (existingSlugs.has(candidate));

            return candidate;
        }

        function ensureUniqueCampaignSlug(campaign) {
            const existingSlugs = getExistingCampaignSlugs(campaign?.id || '');
            const currentSlug = String(campaign?.slug || '').trim();

            if (currentSlug && !existingSlugs.has(currentSlug)) {
                return { ...campaign, slug: currentSlug };
            }

            return {
                ...campaign,
                slug: generateUniqueCampaignSlug(campaign?.title || 'link', campaign?.id || '')
            };
        }

        // ==================== NO-LOGIN / SHARE HELPERS ====================
        function generateGuestUsername() {
            return 'guest-' + Math.random().toString(36).slice(2, 8);
        }

        function ensureGuestUser() {
            if (!state.user) {
                state.user = {
                    name: 'Guest Creator',
                    email: '',
                    username: generateGuestUsername(),
                    plan: 'free',
                    isGuest: true
                };
                saveState();
            }
            return state.user;
        }

        function getBaseUrl() {
            return window.location.href.split('#')[0];
        }

        function simpleHash(value) {
            let hash = 0;
            for (let i = 0; i < value.length; i++) {
                hash = ((hash << 5) - hash) + value.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(36);
        }

        function encodeShareData(data) {
            const json = JSON.stringify(data);
            const binary = encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function decodeShareData(encoded) {
            let base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
            while (base64.length % 4) base64 += '=';
            const binary = atob(base64);
            const json = decodeURIComponent(Array.from(binary).map(char => '%' + char.charCodeAt(0).toString(16).padStart(2, '0')).join(''));
            return JSON.parse(json);
        }

        function getShareableLink(username, campaign) {
            const payload = {
                id: campaign.id,
                username,
                title: campaign.title,
                slug: campaign.slug,
                description: campaign.description,
                rewardType: campaign.rewardType,
                rewardPayload: campaign.rewardPayload,
                actions: campaign.actions,
                requireEmail: !!campaign.requireEmail
            };
            return `${getBaseUrl()}#/c/${encodeShareData(payload)}`;
        }

        function buildSharedCampaign(payload) {
            return {
                id: payload.id || `shared-${simpleHash(JSON.stringify(payload))}`,
                title: payload.title || 'Locked Content',
                slug: payload.slug || 'shared-link',
                description: payload.description || '',
                rewardType: payload.rewardType || 'url',
                rewardPayload: payload.rewardPayload || '',
                actions: Array.isArray(payload.actions) ? payload.actions : [],
                requireEmail: !!payload.requireEmail,
                status: 'active',
                clicks: 0,
                unlocks: 0,
                createdAt: payload.createdAt || new Date().toISOString()
            };
        }

        // ==================== EVENT HANDLERS ====================
        
        function handleDemoAction(index) {
            if (index === state.demoProgress) {
                state.demoProgress++;
                render();
            }
        }

        function handleSignUp(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            state.user = {
                name: formData.get('name'),
                email: formData.get('email'),
                username: formData.get('username'),
                plan: 'free'
            };
            
            saveState();
            navigate('dashboard');
        }

        function handleSignIn(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            // For demo, just check if user exists
            if (state.user && state.user.email === formData.get('email')) {
                navigate('dashboard');
            } else {
                document.getElementById('signinError').textContent = 'Invalid credentials. Try signing up first!';
                document.getElementById('signinError').classList.remove('hidden');
            }
        }


        async function handleAdminLogin(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const username = String(formData.get('adminUsername') || '').trim().toLowerCase();
            const passcode = String(formData.get('adminPasscode') || '');

            if (username === ADMIN_USERNAME && passcode === ADMIN_PASSCODE) {
                state.adminLoggedIn = true;
                localStorage.setItem('contentLockerAdminSession', 'true');
                navigate('adminDashboard');
                await refreshAdminCloudData(false);
                return;
            }

            const error = document.getElementById('adminLoginError');
            if (error) {
                error.textContent = 'Invalid admin username or passcode.';
                error.classList.remove('hidden');
            }
        }

        function adminLogout() {
            state.adminLoggedIn = false;
            localStorage.removeItem('contentLockerAdminSession');
            navigate('adminLogin');
        }

        function adminCopyCampaignLink(ownerUsername, campaignId) {
            const campaign = getAdminCampaign(ownerUsername, campaignId);
            if (!campaign) {
                alert('Campaign not found.');
                return;
            }
            saveCampaignEverywhere(ownerUsername, campaignId, campaign);
            copyTextToClipboard(getShareableLink(ownerUsername, campaign));
        }

        function handleAdminSaveCampaign(event, ownerUsername, campaignId) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const existingCampaign = getAdminCampaign(ownerUsername, campaignId);

            if (!existingCampaign) {
                alert('Campaign not found.');
                navigate('adminDashboard');
                return;
            }

            const actionCount = Number(formData.get('actionCount') || 0);
            const actions = [];
            for (let index = 0; index < actionCount; index++) {
                const platformId = formData.get(`actionPlatform_${index}`);
                if (!platformId) continue;
                const platform = PLATFORMS.find(item => item.id === platformId) || { action: 'Complete' };
                actions.push({
                    platform: platformId,
                    targetUrl: String(formData.get(`actionTarget_${index}`) || '').trim(),
                    actionType: platform.action.toLowerCase()
                });
            }

            const updatedCampaign = ensureUniqueCampaignSlug({
                ...existingCampaign,
                title: String(formData.get('title') || '').trim(),
                slug: existingCampaign.slug || '',
                description: String(formData.get('description') || '').trim(),
                rewardType: String(formData.get('rewardType') || 'url'),
                rewardPayload: String(formData.get('rewardPayload') || '').trim(),
                status: String(formData.get('status') || 'active'),
                requireEmail: formData.get('requireEmail') === 'on',
                actions
            });

            saveCampaignEverywhere(ownerUsername, campaignId, updatedCampaign);
            alert('Link updated successfully.');
            navigate('adminDashboard', { filterUser: ownerUsername });
        }

        function adminAddSelectedAction(ownerUsername, campaignId) {
            const select = document.getElementById('adminAddActionPlatform');
            adminAddAction(ownerUsername, campaignId, select ? select.value : 'visitpage');
        }

        function adminAddAction(ownerUsername, campaignId, platformId) {
            const campaign = getAdminCampaign(ownerUsername, campaignId);
            if (!campaign) return;
            const platform = PLATFORMS.find(item => item.id === platformId) || PLATFORMS[0];
            const updatedCampaign = {
                ...campaign,
                actions: [
                    ...(Array.isArray(campaign.actions) ? campaign.actions : []),
                    { platform: platform.id, targetUrl: '', actionType: platform.action.toLowerCase() }
                ]
            };
            saveCampaignEverywhere(ownerUsername, campaignId, updatedCampaign);
            navigate('adminEditCampaign', { ownerUsername, campaignId });
        }

        function adminRemoveAction(ownerUsername, campaignId, actionIndex) {
            const campaign = getAdminCampaign(ownerUsername, campaignId);
            if (!campaign) return;
            const actions = Array.isArray(campaign.actions) ? [...campaign.actions] : [];
            actions.splice(actionIndex, 1);
            saveCampaignEverywhere(ownerUsername, campaignId, { ...campaign, actions });
            navigate('adminEditCampaign', { ownerUsername, campaignId });
        }

        function adminDeleteCampaign(ownerUsername, campaignId) {
            if (!confirm('Delete this user link permanently from the admin store?')) return;
            deleteCampaignEverywhere(ownerUsername, campaignId);
            navigate('adminDashboard', { filterUser: ownerUsername });
        }

        function logout() {
            if (confirm('Clear all locally saved campaigns and reset this guest workspace?')) {
                state.user = null;
                state.campaigns = [];
                saveState();
                navigate('home');
            }
        }

        function copyLink(username, slug) {
            const campaign = state.campaigns.find(c => c.slug === slug);
            const url = campaign ? getShareableLink(username, campaign) : `${getBaseUrl()}#/u/${username}/${slug}`;
            copyTextToClipboard(url);
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => alert('Shareable link copied to clipboard!'))
                    .catch(() => fallbackCopyText(text));
            } else {
                fallbackCopyText(text);
            }
        }

        function fallbackCopyText(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                alert('Shareable link copied to clipboard!');
            } catch (error) {
                prompt('Copy your shareable link:', text);
            }
            document.body.removeChild(textarea);
        }

        // Campaign creation handlers
        function handleCampaignStep1(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            state.campaignFormData = {
                ...state.campaignFormData,
                title: formData.get('title'),
                description: formData.get('description'),
            };
            
            state.campaignStep = 2;
            render();
        }

        function handleCampaignStep2(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            state.campaignFormData = {
                ...state.campaignFormData,
                rewardType: formData.get('rewardType'),
                rewardPayload: formData.get('rewardPayload'),
            };
            
            state.campaignStep = 3;
            render();
        }

        function campaignPrevStep() {
            state.campaignStep = Math.max(1, (state.campaignStep || 1) - 1);
            render();
        }

        function campaignNextStep() {
            state.campaignStep = Math.min(4, (state.campaignStep || 1) + 1);
            render();
        }

        function addAction(platformId) {
            if (!state.campaignFormData.actions) {
                state.campaignFormData.actions = [];
            }
            
            const platform = PLATFORMS.find(p => p.id === platformId);
            state.campaignFormData.actions.push({
                platform: platformId,
                targetUrl: '',
                actionType: platform.action.toLowerCase()
            });
            
            render();
        }

        function removeAction(index) {
            state.campaignFormData.actions.splice(index, 1);
            render();
        }

        function updateAction(index, url) {
            state.campaignFormData.actions[index].targetUrl = url;
        }

        function publishCampaign() {
            ensureGuestUser();
            const campaignId = Date.now().toString();
            const campaign = ensureUniqueCampaignSlug({
                id: campaignId,
                ...state.campaignFormData,
                slug: generateUniqueCampaignSlug(state.campaignFormData?.title || 'link', campaignId),
                status: 'active',
                clicks: 0,
                unlocks: 0,
                createdAt: new Date().toISOString()
            });
            
            state.campaigns.push(campaign);
            saveState();
            
            state.campaignStep = 1;
            state.campaignFormData = null;
            navigate('dashboard');
        }

        // Unlock page handlers
        function getUnlockState(campaignId) {
            const saved = localStorage.getItem(`unlock-${campaignId}`);
            const unlockState = saved ? JSON.parse(saved) : {
                completedActions: [],
                pendingActions: {},
                unlocked: false,
                email: '',
                showConfetti: false
            };

            unlockState.completedActions = Array.isArray(unlockState.completedActions) ? unlockState.completedActions : [];
            unlockState.pendingActions = unlockState.pendingActions && typeof unlockState.pendingActions === 'object' ? unlockState.pendingActions : {};
            return unlockState;
        }

        function saveUnlockState(campaignId, unlockState) {
            localStorage.setItem(`unlock-${campaignId}`, JSON.stringify(unlockState));
        }

        function getCurrentUnlockOwnerUsername() {
            return state.pageData?.sharedCampaign?.ownerUsername || state.pageData?.username || state.user?.username || '';
        }

        function cloudIncrementCampaignStat(campaignId, field, amount = 1) {
            if (!isFirebaseReady() || !campaignId) return;
            const ownerUsername = getCurrentUnlockOwnerUsername();
            if (!ownerUsername) return;

            const incrementValue = window.firebase?.firestore?.FieldValue
                ? window.firebase.firestore.FieldValue.increment(amount)
                : amount;

            window.firebaseDB.collection('campaigns').doc(getCampaignDocId(ownerUsername, campaignId)).set({
                id: campaignId,
                ownerUsername,
                [field]: incrementValue,
                updatedAt: new Date().toISOString()
            }, { merge: true }).catch(error => {
                console.warn('Could not update Firebase campaign stat:', error);
                setCloudStatus('error', error.message || String(error));
            });
        }

        function incrementCampaignClicks(campaignId, amount = 1) {
            const campaign = state.campaigns.find(c => c.id === campaignId);
            if (campaign) {
                campaign.clicks = (campaign.clicks || 0) + amount;
                saveState();
            } else {
                cloudIncrementCampaignStat(campaignId, 'clicks', amount);
            }
        }

        function markActionCompleted(campaignId, actionIndex) {
            const unlockState = getUnlockState(campaignId);
            const alreadyCompleted = unlockState.completedActions.includes(actionIndex);

            if (!alreadyCompleted) {
                unlockState.completedActions.push(actionIndex);
                incrementCampaignClicks(campaignId);
            }

            if (unlockState.pendingActions) {
                delete unlockState.pendingActions[actionIndex];
            }

            saveUnlockState(campaignId, unlockState);
            return !alreadyCompleted;
        }

        function processExpiredPendingActions(campaignId) {
            const unlockState = getUnlockState(campaignId);
            const now = Date.now();
            let changed = false;

            Object.entries(unlockState.pendingActions || {}).forEach(([index, pendingUntil]) => {
                const actionIndex = Number(index);
                if (Number(pendingUntil) <= now && !unlockState.completedActions.includes(actionIndex)) {
                    unlockState.completedActions.push(actionIndex);
                    delete unlockState.pendingActions[index];
                    incrementCampaignClicks(campaignId);
                    changed = true;
                } else if (Number(pendingUntil) <= now) {
                    delete unlockState.pendingActions[index];
                    changed = true;
                }
            });

            if (changed) {
                saveUnlockState(campaignId, unlockState);
            }
        }

        function startActionTimer(campaignId, actionIndex) {
            const timerKey = `${campaignId}-${actionIndex}`;
            if (actionTimerIntervals[timerKey]) {
                clearInterval(actionTimerIntervals[timerKey]);
            }

            actionTimerIntervals[timerKey] = setInterval(() => {
                const unlockState = getUnlockState(campaignId);
                const pendingUntil = Number(unlockState.pendingActions?.[actionIndex] || 0);

                if (!pendingUntil) {
                    clearInterval(actionTimerIntervals[timerKey]);
                    delete actionTimerIntervals[timerKey];
                    return;
                }

                if (Date.now() >= pendingUntil) {
                    clearInterval(actionTimerIntervals[timerKey]);
                    delete actionTimerIntervals[timerKey];
                    markActionCompleted(campaignId, actionIndex);
                    render({ preserveScroll: true });
                } else {
                    render({ preserveScroll: true });
                }
            }, 250);
        }

        function completeUnlockAction(campaignId, actionIndex, targetUrl) {
            const unlockState = getUnlockState(campaignId);

            if (unlockState.completedActions.includes(actionIndex) || unlockState.pendingActions?.[actionIndex]) {
                return;
            }

            if (targetUrl && targetUrl.trim()) {
                window.open(targetUrl, '_blank');
            }

            unlockState.pendingActions = unlockState.pendingActions || {};
            unlockState.pendingActions[actionIndex] = Date.now() + 3000;
            saveUnlockState(campaignId, unlockState);
            render({ preserveScroll: true });
            startActionTimer(campaignId, actionIndex);
        }


        function handleUnlock(campaignId, requireEmail) {
            const unlockState = getUnlockState(campaignId);
            
            if (requireEmail) {
                const email = document.getElementById('unlockEmail')?.value;
                if (!email) {
                    alert('Please enter your email to unlock');
                    return;
                }
                unlockState.email = email;
            }
            
            unlockState.unlocked = true;
            unlockState.showConfetti = true;
            saveUnlockState(campaignId, unlockState);
            
            // Update campaign unlocks
            const campaign = state.campaigns.find(c => c.id === campaignId);
            if (campaign) {
                campaign.unlocks = (campaign.unlocks || 0) + 1;
                saveState();
            } else {
                cloudIncrementCampaignStat(campaignId, 'unlocks', 1);
            }
            
            render();
            
            setTimeout(() => {
                unlockState.showConfetti = false;
                saveUnlockState(campaignId, unlockState);
                render();
            }, 3000);
        }

        // ==================== RENDER ====================
        function render(options = {}) {
            const app = document.getElementById('app');
            const previousScrollY = window.scrollY;
            let html = '';

            switch (state.currentPage) {
                case 'home':
                    html = HomePage();
                    break;
                case 'signup':
                    html = SignUpPage();
                    break;
                case 'signin':
                    html = SignInPage();
                    break;
                case 'dashboard':
                    html = DashboardPage();
                    break;
                case 'newCampaign':
                    html = NewCampaignPage();
                    break;
                case 'unlock':
                    html = UnlockPage();
                    break;
                case 'profile':
                    html = ProfilePage();
                    break;
                case 'adminLogin':
                    html = AdminLoginPage();
                    break;
                case 'adminDashboard':
                    html = AdminDashboardPage();
                    break;
                case 'adminEditCampaign':
                    html = AdminEditCampaignPage();
                    break;
                default:
                    html = HomePage();
            }

            app.innerHTML = html;
            loadShortUrlAds();
            if (options.preserveScroll) {
                window.scrollTo(0, previousScrollY);
            } else {
                window.scrollTo(0, 0);
            }
        }

        // ==================== INIT ====================
        loadState();
        if (isFirebaseReady()) {
            syncCurrentWorkspaceToCloud();
            loadCurrentUserCampaignsFromCloud();
            if (state.adminLoggedIn) {
                refreshAdminCloudData(false);
            }
        }
        
        // Handle hash routing
        function handleHashChange() {
            const hash = window.location.hash.slice(1);
            if (hash === '/admin' || hash === '/admin/login') {
                navigate(state.adminLoggedIn ? 'adminDashboard' : 'adminLogin');
                return;
            }
            if (hash.startsWith('/c/')) {
                try {
                    const payload = decodeShareData(hash.slice(3));
                    const sharedCampaign = buildSharedCampaign(payload);
                    navigate('unlock', {
                        username: payload.username || 'creator',
                        slug: sharedCampaign.slug,
                        sharedCampaign
                    });
                } catch (error) {
                    console.error('Invalid shared campaign link', error);
                    navigate('home');
                }
                return;
            }
            if (hash.startsWith('/u/')) {
                const [, , username, slug] = hash.split('/');
                if (slug) {
                    navigate('unlock', { username, slug });
                } else {
                    navigate('profile', { username });
                }
            }
        }

        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();

        // Initial render
        if (!state.currentPage || state.currentPage === 'home') {
            render();
        }
    </script>
